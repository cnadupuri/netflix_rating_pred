name: Netflix ML CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Verify Model Files
      run: |
        test -f model(netflix).pkl
        test -f preprocessor(netflix).pkl

    - name: Test Model Loading
      run: |
        python -c "import joblib; joblib.load('model.pkl'); joblib.load('preprocessor.pkl'); print('Model Loaded Successfully')"
